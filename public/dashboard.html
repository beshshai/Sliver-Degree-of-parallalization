<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Jute sliver analyzer</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="topbar" id="topbar"></div>

  <div class="page">
    <h1 class="page-title">Upload samples</h1>
    <p class="page-sub">Drop in photos of jute sliver from the spreader. Each image is analyzed for fiber parallelization automatically.</p>

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <div style="font-size:28px;">+</div>
        <p>Drop images here or click to browse</p>
        <span>JPG or PNG, up to 10 at a time</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      <div class="thumb-grid" id="thumbGrid"></div>
      <div style="margin-top:1rem;">
        <input type="text" id="notesInput" placeholder="Optional note for this batch (e.g. machine no., date, settings)">
      </div>
      <div style="display:flex; gap:10px; margin-top:1rem;">
        <button id="analyzeBtn" style="display:none;">Analyze and upload</button>
        <button id="clearBtn" class="secondary" style="display:none;">Clear</button>
      </div>
      <div class="error-msg" id="uploadError" style="display:none;"></div>
    </div>

    <h1 class="page-title" style="margin-top:2rem;">Recent samples</h1>
    <p class="page-sub">All uploads from the team. Filter by person or date.</p>

    <div class="filters">
      <select id="userFilter"><option value="">All users</option></select>
      <input type="text" id="fromFilter" placeholder="From (YYYY-MM-DD)">
      <input type="text" id="toFilter" placeholder="To (YYYY-MM-DD)">
      <button class="secondary" id="applyFilters" style="padding:9px 14px;">Apply</button>
      <button class="secondary" id="resetFilters" style="padding:9px 14px;">Reset</button>
      <a id="userReportLink" href="#" style="display:none; align-self:center; font-size:13px;">View report &rarr;</a>
    </div>

    <div class="card" id="feedCard">
      <div id="feedList"></div>
    </div>
  </div>

  <script src="/shared.js?v=2"></script>
  <script>
    let currentUser = null;
    let fileMap = new Map();
    let fileCounter = 0;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const thumbGrid = document.getElementById('thumbGrid');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const uploadError = document.getElementById('uploadError');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    function addFiles(newFiles) {
      const remaining = 10 - fileMap.size;
      newFiles.slice(0, remaining).forEach(f => {
        if (!f.type.startsWith('image/')) return;
        const idx = fileCounter++;
        fileMap.set(idx, f);
        const reader = new FileReader();
        reader.onload = e => {
          const wrap = document.createElement('div');
          wrap.className = 'thumb-wrap';
          wrap.id = 'thumb-' + idx;
          wrap.innerHTML = `<img src="${e.target.result}" alt="sample ${idx+1}"><button class="thumb-remove" onclick="removeFile(${idx})">×</button>`;
          thumbGrid.appendChild(wrap);
        };
        reader.readAsDataURL(f);
      });
      updateButtons();
    }

    function removeFile(idx) {
      fileMap.delete(idx);
      const el = document.getElementById('thumb-' + idx);
      if (el) el.remove();
      updateButtons();
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      fileMap.clear();
      thumbGrid.innerHTML = '';
      fileInput.value = '';
      updateButtons();
    });

    function updateButtons() {
      const hasFiles = fileMap.size > 0;
      analyzeBtn.style.display = hasFiles ? 'inline-flex' : 'none';
      clearBtn.style.display = hasFiles ? 'inline-flex' : 'none';
    }

    analyzeBtn.addEventListener('click', async () => {
      uploadError.style.display = 'none';
      const validFiles = [...fileMap.values()];
      if (!validFiles.length) return;

      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="spinner"></span> Analyzing...';

      const notes = document.getElementById('notesInput').value;

      for (const f of validFiles) {
        const formData = new FormData();
        formData.append('image', f);
        formData.append('notes', notes);
        try {
          const res = await fetch('/api/samples', { method: 'POST', body: formData });
          const data = await res.json();
          if (!res.ok) {
            uploadError.textContent = `${f.name}: ${data.error}`;
            uploadError.style.display = 'block';
            continue;
          }
        } catch (err) {
          uploadError.textContent = `${f.name}: upload failed`;
          uploadError.style.display = 'block';
        }
      }

      fileMap.clear();
      thumbGrid.innerHTML = '';
      fileInput.value = '';
      document.getElementById('notesInput').value = '';
      updateButtons();
      analyzeBtn.disabled = false;
      analyzeBtn.innerHTML = 'Analyze and upload';

      loadFeed();
    });

    async function loadUsers() {
      const res = await fetch('/api/users');
      const data = await res.json();
      const select = document.getElementById('userFilter');
      data.users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = u.name;
        select.appendChild(opt);
      });
    }

    function buildQuery() {
      const params = new URLSearchParams();
      const userId = document.getElementById('userFilter').value;
      const from = document.getElementById('fromFilter').value.trim();
      const to = document.getElementById('toFilter').value.trim();
      if (userId) params.set('user_id', userId);
      if (from) params.set('from', from);
      if (to) params.set('to', to + ' 23:59:59');
      return params.toString();
    }

    async function loadFeed() {
      const feedList = document.getElementById('feedList');
      feedList.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading...</div>';

      const query = buildQuery();
      const res = await fetch('/api/samples' + (query ? '?' + query : ''));
      const data = await res.json();

      if (!data.samples.length) {
        feedList.innerHTML = '<div class="empty-state">No samples yet. Upload one above to get started.</div>';
        return;
      }

      feedList.innerHTML = '';
      data.samples.forEach(s => {
        const badge = scoreBadgeClass(s.score);
        const color = scoreColor(s.score);
        const row = document.createElement('div');
        row.className = 'result-row';
        const canDelete = currentUser && currentUser.id === s.user_id;
        row.innerHTML = `
          <img class="thumb" src="${s.image_path}" alt="sample from ${escapeHtml(s.user_name)}">
          <div class="result-meta">
            <div class="result-meta-top">
              <span class="uploader">${escapeHtml(s.user_name)}</span>
              <span class="badge ${badge.cls}">${badge.label} · ${s.score}/100</span>
            </div>
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${s.score}%; background:${color};"></div></div>
            <div class="result-metrics">
              Mean angle ${s.mean_angle_deg}° · std dev ${s.angular_stddev_deg}° · ${s.width}×${s.height}px
              ${s.notes ? ' · ' + escapeHtml(s.notes) : ''}
            </div>
            <div class="result-meta-top" style="margin-top:4px;">
              <span class="timestamp">${timeAgo(s.created_at)}</span>
              ${canDelete ? `<button class="delete-btn" data-id="${s.id}">Delete</button>` : ''}
            </div>
          </div>
        `;
        feedList.appendChild(row);
      });

      feedList.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this sample?')) return;
          await fetch('/api/samples/' + btn.dataset.id, { method: 'DELETE' });
          loadFeed();
        });
      });
    }

    function syncUserReportLink() {
      const userId = document.getElementById('userFilter').value;
      const link = document.getElementById('userReportLink');
      if (userId) {
        link.href = '/report?type=user&id=' + encodeURIComponent(userId);
        link.style.display = 'inline-block';
      } else {
        link.style.display = 'none';
      }
    }

    document.getElementById('userFilter').addEventListener('change', syncUserReportLink);

    document.getElementById('applyFilters').addEventListener('click', loadFeed);
    document.getElementById('resetFilters').addEventListener('click', () => {
      document.getElementById('userFilter').value = '';
      document.getElementById('fromFilter').value = '';
      document.getElementById('toFilter').value = '';
      syncUserReportLink();
      loadFeed();
    });

    (async function init() {
      currentUser = await initTopbar('dashboard');
      if (!currentUser) return;
      await loadUsers();
      await loadFeed();
    })();
  </script>
</body>
</html>
