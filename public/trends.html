<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trends — Jute sliver analyzer</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="topbar" id="topbar"></div>

  <div class="page">
    <h1 class="page-title">Score trends</h1>
    <p class="page-sub">Average parallelization score over time, and by team member.</p>

    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:0.75rem; flex-wrap:wrap;">
        <span style="font-size:13px; color:#6b6a64;">Group by</span>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <select id="batchSelect" style="width:auto; min-width:180px; display:none;">
            <option value="">All batches (averages)</option>
          </select>
          <select id="groupBySelect" style="width:auto; min-width:140px;">
            <option value="hour">Hour</option>
            <option value="day" selected>Day</option>
            <option value="month">Month</option>
            <option value="year">Year</option>
            <option value="log">Log (every sample)</option>
            <option value="batch">Batch</option>
          </select>
        </div>
      </div>
      <div id="chartWrap">
        <canvas id="trendChart" height="100"></canvas>
      </div>
    </div>

    <h1 class="page-title" style="margin-top:2rem;">By team member</h1>
    <div class="card">
      <div id="userTable"></div>
    </div>
  </div>

  <script src="/shared.js?v=2"></script>
  <script>
    let chartInstance = null;

    function formatLabel(day, groupBy) {
      // 'day' field holds different shapes depending on groupBy:
      // hour: "2026-06-19 14:00" | day: "2026-06-19" | month: "2026-06"
      // year: "2026" | log/batch_log: full timestamp from created_at
      // batch: the batch's name (already human-readable)
      if (groupBy === 'log' || groupBy === 'batch_log') {
        const d = new Date(day.replace(' ', 'T') + 'Z');
        return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }
      if (groupBy === 'hour') {
        const d = new Date(day.replace(' ', 'T') + ':00Z');
        return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit' });
      }
      if (groupBy === 'month') {
        const [y, m] = day.split('-');
        return new Date(Number(y), Number(m) - 1).toLocaleString(undefined, { month: 'short', year: 'numeric' });
      }
      // day, year, batch — already human-readable as-is
      return day;
    }

    async function loadChart(groupBy, batchId) {
      const chartWrap = document.getElementById('chartWrap');
      let url = '/api/stats/summary?group_by=' + encodeURIComponent(groupBy);
      if (groupBy === 'batch_log') url += '&batch_id=' + encodeURIComponent(batchId);

      const res = await fetch(url);
      const data = await res.json();

      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      if (!data.overTime || !data.overTime.length) {
        chartWrap.innerHTML = '<div class="empty-state">No data yet for this selection.</div>';
        return;
      }

      chartWrap.innerHTML = '<canvas id="trendChart" height="100"></canvas>';
      const ctx = document.getElementById('trendChart');
      // 'log' and 'batch_log' are both per-sample (no server-side bucketing),
      // so they need the same unique-index x-axis treatment.
      const isPerSample = groupBy === 'log' || groupBy === 'batch_log';

      // IMPORTANT: Chart.js's default category x-axis merges points that
      // share an identical label string. In per-sample modes many samples
      // can carry the same minute-resolution timestamp (e.g. a batch
      // upload), which previously collapsed them into a single visible
      // point. Using {x, y} objects with a numeric/unique x avoids that.
      const labels = data.overTime.map(d => formatLabel(d.day, groupBy));
      const points = isPerSample
        ? data.overTime.map((d, i) => ({ x: i, y: d.avg_score }))
        : data.overTime.map(d => d.avg_score);

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: isPerSample ? undefined : labels,
          datasets: [{
            label: 'Average score',
            data: points,
            borderColor: '#185fa5',
            backgroundColor: 'rgba(24,95,165,0.1)',
            tension: isPerSample ? 0.15 : 0.25,
            pointRadius: isPerSample ? 2 : 3,
            fill: true,
          }]
        },
        options: {
          scales: {
            y: { min: 0, max: 100 },
            x: isPerSample
              ? {
                  type: 'linear',
                  ticks: {
                    maxRotation: 45,
                    minRotation: 0,
                    autoSkip: true,
                    callback: (value) => {
                      const i = Math.round(value);
                      return (i === value && labels[i] !== undefined) ? labels[i] : '';
                    }
                  }
                }
              : { ticks: { maxRotation: 45, minRotation: 0, autoSkip: true } }
          },
          plugins: {
            legend: { display: false },
            tooltip: isPerSample ? { callbacks: { title: (items) => labels[items[0].dataIndex] || '' } } : {}
          }
        }
      });
    }

    async function loadBatchOptions() {
      const res = await fetch('/api/batches');
      const data = await res.json();
      const batchSelect = document.getElementById('batchSelect');
      data.batches.filter(b => b.sample_count > 0).forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id;
        opt.textContent = `${b.name} (${b.sample_count} sample${b.sample_count === 1 ? '' : 's'})`;
        batchSelect.appendChild(opt);
      });
    }

    function currentSelection() {
      const groupBy = document.getElementById('groupBySelect').value;
      const batchId = document.getElementById('batchSelect').value;
      if (groupBy === 'batch' && batchId) {
        // A specific batch is picked while in "Batch" mode — drill into
        // that batch's own sample-by-sample trend instead of the
        // all-batches-averaged view.
        return { groupBy: 'batch_log', batchId };
      }
      return { groupBy, batchId: null };
    }

    function refreshChart() {
      const { groupBy, batchId } = currentSelection();
      loadChart(groupBy, batchId);
    }

    async function loadUserTable() {
      const res = await fetch('/api/stats/summary');
      const data = await res.json();
      const userTable = document.getElementById('userTable');

      if (!data.perUser.length) {
        userTable.innerHTML = '<div class="empty-state">No data yet.</div>';
        return;
      }

      const table = document.createElement('table');
      table.style.width = '100%';
      table.style.fontSize = '14px';
      table.innerHTML = `
        <thead>
          <tr style="text-align:left; color:#6b6a64; font-size:12px;">
            <th style="padding:6px 0;">Name</th>
            <th style="padding:6px 0;">Samples</th>
            <th style="padding:6px 0;">Avg score</th>
            <th style="padding:6px 0;"></th>
          </tr>
        </thead>
        <tbody>
          ${data.perUser.map(u => `
            <tr style="border-top:1px solid #ece9e2;">
              <td style="padding:8px 0;">${escapeHtml(u.user_name)}</td>
              <td style="padding:8px 0;">${u.sample_count}</td>
              <td style="padding:8px 0; font-weight:600;">${u.avg_score}</td>
              <td style="padding:8px 0; text-align:right;">
                <a href="/report?type=user&id=${u.user_id}" style="font-size:12px;">View report</a>
              </td>
            </tr>
          `).join('')}
        </tbody>
      `;
      userTable.appendChild(table);
    }

    (async function init() {
      const currentUser = await initTopbar('trends');
      if (!currentUser) return;

      const groupBySelect = document.getElementById('groupBySelect');
      const batchSelect = document.getElementById('batchSelect');

      await loadBatchOptions();

      function syncBatchVisibility() {
        batchSelect.style.display = groupBySelect.value === 'batch' ? 'inline-block' : 'none';
      }

      groupBySelect.addEventListener('change', () => {
        syncBatchVisibility();
        refreshChart();
      });
      batchSelect.addEventListener('change', refreshChart);

      syncBatchVisibility();
      refreshChart();
      await loadUserTable();
    })();
  </script>
</body>
</html>
